# Copia este archivo a application-oauth.properties y añade tus credenciales de Google
# O configura las variables de entorno GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET

# Obtén las credenciales en: https://console.cloud.google.com/
# 1. Crear proyecto (o seleccionar existente)
# 2. APIs y servicios → Credenciales → Crear credenciales → ID de cliente de OAuth 2.0
# 3. Tipo: Aplicación web
# 4. URIs de redirección autorizados: http://localhost:8080/login/oauth2/code/google

spring.security.oauth2.client.registration.google.client-id=TU_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TU_CLIENT_SECRET
