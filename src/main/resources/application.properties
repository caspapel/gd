# Cargar credenciales OAuth si existen (copia application-oauth.example.properties)
spring.config.import=optional:classpath:application-oauth.properties

server.port=8080
# Detrás de proxy/Cloud Run: usar X-Forwarded-* para construir URLs (redirect_uri en HTTPS)
server.forward-headers-strategy=framework

# Almacenamiento de documentos (carpeta relativa al directorio de trabajo)
app.documents.path=documents

# Límite de subida de archivos (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Google OAuth2 - Configura en application-oauth.properties (copia application-oauth.example.properties)
# O usa variables de entorno GOOGLE_CLIENT_ID y GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:pon-tu-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:pon-tu-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
