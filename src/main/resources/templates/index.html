<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Documentos</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 480px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 { color: #1a1a2e; margin-bottom: 1rem; }
        p { color: #6c757d; margin-bottom: 2rem; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .links a {
            display: block;
            padding: 1rem 1.5rem;
            background: #4a90d9;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
        }
        .links a:hover { background: #3a7bc8; }
    </style>
</head>
<body>
    <h1>Gestor de Documentos</h1>
    <p sec:authorize="isAuthenticated()">Hola, <span sec:authentication="name"></span></p>
    <p sec:authorize="!isAuthenticated()">Inicia sesión para gestionar documentos.</p>

    <div sec:authorize="isAuthenticated()" class="links">
        <a th:href="@{/addDocument}">Añadir documento</a>
        <a th:href="@{/downloadDocument}">Descargar documento</a>
    </div>

    <div sec:authorize="!isAuthenticated()" class="links" style="margin-top: 1rem;">
        <a th:href="@{/login}">Iniciar sesión con Google</a>
    </div>

    <div sec:authorize="isAuthenticated()" style="margin-top: 2rem;">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" style="background: #6c757d; padding: 0.5rem 1rem; border: none; border-radius: 6px; color: white; cursor: pointer;">Cerrar sesión</button>
        </form>
    </div>
</body>
</html>
