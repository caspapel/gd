<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir documento</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 480px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 { color: #1a1a2e; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
        }
        input[type="file"]:hover { border-color: #4a90d9; background: #f0f7ff; }
        button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #3a7bc8; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Añadir documento</h1>
    <nav style="margin-bottom: 1.5rem;">
        <a href="/" style="color: #4a90d9; text-decoration: none; margin-right: 1rem;">Inicio</a>
        <a href="/downloadDocument" style="color: #4a90d9; text-decoration: none;">Descargar documento</a>
    </nav>
    <div th:if="${success != null}" th:class="${success} ? 'alert alert-success' : 'alert alert-error'" th:text="${message}"></div>
    <form method="post" action="/addDocument" enctype="multipart/form-data">
        <div class="form-group">
            <label for="document">Selecciona un archivo</label>
            <input type="file" id="document" name="document" required accept="*/*">
        </div>
        <button type="submit">Guardar documento</button>
    </form>
</body>
</html>
