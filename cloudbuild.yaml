# Logs solo a Cloud Logging (requerido si el trigger usa cuenta de servicio)
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Crear repositorio en Artifact Registry si no existe
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud artifacts repositories create gd --repository-format=docker --location=europe-southwest1 --description="GD app images" 2>/dev/null || true'

  # Build de la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-southwest1-docker.pkg.dev/$PROJECT_ID/gd/gd-app:$COMMIT_SHA'
      - '.'

  # Push a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-southwest1-docker.pkg.dev/$PROJECT_ID/gd/gd-app:$COMMIT_SHA'

  # Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gd-git'
      - '--image=europe-southwest1-docker.pkg.dev/$PROJECT_ID/gd/gd-app:$COMMIT_SHA'
      - '--region=europe-southwest1'
      - '--platform=managed'
      - '--allowunauthenticated'

images:
  - 'europe-southwest1-docker.pkg.dev/$PROJECT_ID/gd/gd-app:$COMMIT_SHA'
